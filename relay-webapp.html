<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Relay Webapp</title>\n    <script>\n        function openRelayWindow() {\n            // Get the text input value from main window\n            const text = document.getElementById('textInput').value;\n            // Open a new window and relay the message\n            const newWindow = window.open('', '_blank', 'width=400,height=200');\n            newWindow.document.write(`<html><head><title>Relay Window</title></head><body>`);\n            newWindow.document.write(`<h1>Relay Message</h1><p>${text}</p>`);\n            newWindow.document.write(`</body></html>`);\n            newWindow.document.close();\n        }\n    <\/script>\n</head>\n<body>\n    <h1>Relay Web App</h1>\n    <input type="text" id="textInput" placeholder="Type your message here">\n    <button onclick="openRelayWindow()">Relay Message</button>\n</body>\n</html>\n
